name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        working-directory: .
        run: pnpm install --no-frozen-lockfile

      - name: Verify token + account
        run: |
          echo "::group::Token presence (no values)"
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then echo "::error::CLOUDFLARE_API_TOKEN secret is empty or missing"; exit 1; fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then echo "::error::CLOUDFLARE_ACCOUNT_ID secret is empty or missing"; exit 1; fi
          echo "Token length: ${#CLOUDFLARE_API_TOKEN} chars (40 expected)"
          echo "Account ID length: ${#CLOUDFLARE_ACCOUNT_ID} chars (32 expected)"
          echo "::endgroup::"

          echo "::group::wrangler whoami"
          npx wrangler whoami
          echo "::endgroup::"

      - name: Deploy
        run: npx wrangler deploy --verbose
