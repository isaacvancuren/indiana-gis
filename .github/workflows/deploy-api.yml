name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch: {}

# Serialize deploys: never run two at once on the same branch.
concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

# Default GITHUB_TOKEN to read-only. Cloudflare deploy uses CLOUDFLARE_API_TOKEN, not GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/api
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        working-directory: .
        run: pnpm install --no-frozen-lockfile

      - name: Verify token + account
        run: |
          echo "::group::Token presence (no values)"
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then echo "::error::CLOUDFLARE_API_TOKEN secret is empty or missing"; exit 1; fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then echo "::error::CLOUDFLARE_ACCOUNT_ID secret is empty or missing"; exit 1; fi
          echo "Token length: ${#CLOUDFLARE_API_TOKEN} chars (40 expected)"
          echo "Account ID length: ${#CLOUDFLARE_ACCOUNT_ID} chars (32 expected)"
          echo "::endgroup::"

          echo "::group::wrangler whoami"
          npx wrangler whoami
          echo "::endgroup::"

      - name: Apply D1 migrations
        # Idempotent: wrangler tracks which migrations have been applied via a
        # _cf_KV table inside D1. Re-running is a no-op if everything is current.
        # Continue-on-error: a migration failure should NOT block the worker
        # deploy itself — we'd rather have stale schema + working worker than
        # broken deploy. Migration failures show up in Sentry once SENTRY_DSN_API
        # is set.
        run: npx wrangler d1 migrations apply mapnova --remote
        continue-on-error: true

      - name: Deploy
        run: npx wrangler deploy
