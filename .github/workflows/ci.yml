name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel older runs on the same ref when a newer one arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default GITHUB_TOKEN to read-only. Steps that need writes must elevate per-job.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify apps/web/index.html exists
        run: test -f apps/web/index.html || (echo "::error::apps/web/index.html missing — Pages deploy will break" && exit 1)

      - name: Syntax-check asset JS files
        run: |
          shopt -s nullglob
          fail=0
          for f in apps/web/static/v2/*.js; do
            if ! node --check "$f"; then
              echo "::error file=$f::syntax error"
              fail=1
            fi
          done
          exit $fail

      - name: Extract and syntax-check inline JS in apps/web/index.html
        run: |
          node <<'EOF'
          const fs = require('fs');
          const { execSync } = require('child_process');
          const html = fs.readFileSync('apps/web/index.html', 'utf8');
          const re = /<script(?![^>]*\bsrc=)[^>]*>([\s\S]*?)<\/script>/g;
          const blocks = [...html.matchAll(re)].map(m => m[1]);
          if (blocks.length === 0) {
            console.log('No inline <script> blocks found.');
            process.exit(0);
          }
          let failed = 0;
          blocks.forEach((src, i) => {
            const tmp = `/tmp/inline-${i}.js`;
            fs.writeFileSync(tmp, src);
            try {
              execSync(`node --check ${tmp}`, { stdio: 'pipe' });
            } catch (e) {
              console.error(`::error::inline <script> block #${i} failed syntax check`);
              console.error(e.stderr.toString());
              failed++;
            }
          });
          if (failed) process.exit(1);
          console.log(`All ${blocks.length} inline scripts passed.`);
          EOF

      - name: HTML validation
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: apps/web
          match: "index.html"
        continue-on-error: true

      - name: Turbo build + lint
        run: pnpm turbo run build lint --continue
        continue-on-error: true

      - name: Block conflict markers in source files
        # Targeted defense against the regression in commit bfe94b5: literal
        # <<<<<<< / ======= / >>>>>>> markers slipped into apps/api/src/index.ts
        # via an unresolved rebase. This grep ensures it can never happen again
        # in source files, even if the broader TS typecheck stays advisory.
        run: |
          if grep -rEn '^(<{7}|>{7})' apps/ packages/ .github/workflows/ 2>/dev/null; then
            echo "::error::Found unresolved merge conflict markers above. Resolve before merging."
            exit 1
          fi
          echo "No conflict markers found."
