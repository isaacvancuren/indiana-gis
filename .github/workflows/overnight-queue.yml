name: Overnight Queue

on:
  schedule:
    # Daily at 07:00 UTC (~2-3 AM US Eastern). GitHub may delay scheduled runs.
    - cron: "0 7 * * *"
  workflow_dispatch: {}
  # Self-trigger when this workflow file changes so the label bootstrap
  # step runs on first deploy without manual intervention.
  push:
    branches: [main]
    paths: [".github/workflows/overnight-queue.yml"]

# Default GITHUB_TOKEN to read-only at workflow scope. The dispatch job elevates to issues:write.
permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Ensure required labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const desired = [
              {
                name: 'claude:overnight',
                color: '0e1116',
                description: 'Process this issue overnight via the scheduled @claude dispatcher',
              },
              {
                name: 'claude:implement',
                color: '1f6feb',
                description: 'Tell @claude to skip planning and open a draft PR with code',
              },
            ];
            for (const label of desired) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
                core.info(`Label "${label.name}" already exists.`);
              } catch (e) {
                if (e.status !== 404) throw e;
                await github.rest.issues.createLabel({ owner, repo, ...label });
                core.info(`Created label "${label.name}".`);
              }
            }

      - name: Trigger @claude on issues labeled claude:overnight
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: 'claude:overnight', per_page: 50,
            });
            if (issues.length === 0) {
              core.info('No issues labeled claude:overnight. Nothing to do.');
              return;
            }
            for (const issue of issues) {
              if (issue.pull_request) continue;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number: issue.number, per_page: 100,
              });
              const alreadyDispatched = comments.some(c =>
                c.body && c.body.includes('<!-- overnight-queue:dispatched -->')
              );
              if (alreadyDispatched) {
                core.info(`#${issue.number} already dispatched, skipping.`);
                continue;
              }
              const body = [
                '<!-- overnight-queue:dispatched -->',
                '@claude implement this issue.',
                '',
                'Read CLAUDE.md first. Then follow these rules **in order**:',
                '',
                '**STEP 1 — Branch and PR setup (always):**',
                '- Create a feature branch named exactly `issue-' + issue.number + '-<short-slug>`.',
                '- Open a **draft PR** before writing code. Use the issue title + " (#' + issue.number + ')" as the PR title.',
                '- Reference this issue in the PR body with `Closes #' + issue.number + '`.',
                '',
                '**STEP 2 — Plan first (DO NOT SKIP):**',
                '- Post a plan as the first PR comment. The plan must include:',
                '  1. The files you will modify or create',
                '  2. The specific function/section names you will touch',
                '  3. Any architecture decisions and the alternatives considered',
                '  4. Any external dependencies (URLs, APIs, secrets)',
                '- After posting the plan, **stop and wait** for an "approved" or "go" comment from @isaacvancuren before writing any code.',
                '- Exception: if the issue body explicitly says "skip plan-first" or "implement directly", you may skip Step 2. Otherwise plan-first is mandatory.',
                '',
                '**STEP 3 — Ambiguity:**',
                '- If the task is ambiguous or has more than one reasonable approach, list the options in the plan comment and stop. Do not pick one yourself unless the issue body explicitly grants you authority to.',
                '',
                '**STEP 4 — Hard constraints (from CLAUDE.md):**',
                '- Do not push to `main`.',
                '- No new build step. No new framework dependency.',
                '- Single-file HTML constraint applies — modifications go in `index.html` plus existing `assets/*.js` modules.',
                '- Do not edit CLAUDE.md autonomously; propose changes via a separate PR.',
                '- Do not bump version numbers unless explicitly asked.',
                '',
                '**STEP 5 — Quality gate:**',
                '- Before requesting review, run `node --check` on every JS file you touched (and on inline `<script>` blocks if you touched `index.html`). The CI workflow will catch this if you forget, but catch it yourself first.',
                '- Watch for smart quotes (`U+2018`, `U+2019`, `U+201C`, `U+201D`) — they are syntax errors in JS string literals. Use ASCII `\'` and `"` only.',
              ].join('\n');
              await github.rest.issues.createComment({
                owner, repo, issue_number: issue.number, body,
              });
              core.info(`Dispatched @claude on #${issue.number}.`);
            }
