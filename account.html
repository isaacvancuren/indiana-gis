<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Account &middot; MapNova</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --bg:#0f1117; --bg-2:#151823; --bg-3:#1c2030; --border:#262a3a; --text:#e6e8ef; --text-dim:#8b91a5; --accent:#4f8cff; --accent-2:#7c5cff; --danger:#ff4f6b; --success:#2ecc71; }
* { box-sizing: border-box; }
html, body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; min-height:100vh; }
a { color:var(--accent); text-decoration:none; }
a:hover { text-decoration:underline; }
.topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:var(--bg-2); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50; }
.brand { display:flex; align-items:center; gap:10px; font-weight:700; font-size:18px; background:linear-gradient(90deg,var(--accent),var(--accent-2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
.brand-dot { width:28px; height:28px; border-radius:8px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); }
.topbar-actions { display:flex; align-items:center; gap:12px; }
.btn { display:inline-flex; align-items:center; gap:6px; padding:9px 16px; border-radius:8px; border:1px solid var(--border); background:var(--bg-3); color:var(--text); cursor:pointer; font-weight:500; font-size:14px; }
.btn:hover { background:#232838; border-color:#36405a; }
.btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent-2)); border-color:transparent; color:#fff; }
.btn-primary:hover { filter:brightness(1.1); }
.btn-danger { background:transparent; border-color:var(--danger); color:var(--danger); }
.btn-danger:hover { background:rgba(255,79,107,.1); }
.btn-ghost { background:transparent; border-color:transparent; color:var(--text-dim); }
.btn-ghost:hover { color:var(--text); background:var(--bg-3); }
.container { max-width:920px; margin:0 auto; padding:32px 24px 80px; }
h1 { font-size:28px; margin:0 0 6px; }
.subtitle { color:var(--text-dim); margin:0 0 28px; font-size:14px; }
.card { background:var(--bg-2); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:18px; }
.card h2 { font-size:16px; margin:0 0 16px; color:var(--text); }
.card-desc { color:var(--text-dim); font-size:13px; margin:-10px 0 18px; }
.row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media (max-width:640px) { .row { grid-template-columns:1fr; } }
.field { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.field label { font-size:12px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:.04em; }
.field input, .field textarea { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--text); font-size:14px; font-family:inherit; }
.field input:focus, .field textarea:focus { outline:none; border-color:var(--accent); }
.field textarea { resize:vertical; min-height:80px; }
.avatar-section { display:flex; align-items:center; gap:20px; }
.avatar { width:96px; height:96px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:flex; align-items:center; justify-content:center; font-size:36px; font-weight:700; color:#fff; overflow:hidden; flex-shrink:0; border:2px solid var(--border); }
.avatar img { width:100%; height:100%; object-fit:cover; }
.avatar-controls { display:flex; flex-direction:column; gap:8px; }
.avatar-controls .btn { font-size:13px; padding:7px 12px; }
.save-row { display:flex; justify-content:flex-end; gap:10px; padding-top:6px; }
.badge { display:inline-block; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
.badge-free { background:rgba(139,145,165,.15); color:var(--text-dim); }
.badge-pro { background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#fff; }
.toast { position:fixed; bottom:24px; right:24px; background:var(--bg-3); border:1px solid var(--border); padding:12px 18px; border-radius:8px; font-size:14px; box-shadow:0 8px 24px rgba(0,0,0,.4); transform:translateY(20px); opacity:0; transition:all .25s; z-index:100; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.success { border-color:var(--success); }
.toast.error { border-color:var(--danger); }
.stat-row { display:flex; gap:24px; flex-wrap:wrap; }
.stat { flex:1; min-width:140px; }
.stat-label { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
.stat-value { font-size:16px; font-weight:600; }
.danger-zone { border-color:rgba(255,79,107,.3); background:rgba(255,79,107,.04); }
.danger-zone h2 { color:var(--danger); }
.loading { display:flex; align-items:center; justify-content:center; padding:60px; color:var(--text-dim); }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#file-input { display:none; }
.modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:200; padding:20px; }
.modal-backdrop.show { display:flex; }
.modal { background:var(--bg-2); border:1px solid var(--border); border-radius:12px; padding:24px; max-width:440px; width:100%; }
.modal h3 { margin:0 0 10px; color:var(--danger); }
.modal p { color:var(--text-dim); font-size:14px; line-height:1.5; }
.modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
.modal input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--text); font-size:14px; margin-top:10px; }
</style>
</head>
<body>
<div class="topbar">
<a href="/" class="brand"><span class="brand-dot"></span>MapNova</a>
<div class="topbar-actions">
<a href="/" class="btn btn-ghost">&larr; Back to Map</a>
<button class="btn" id="signout-btn">Sign out</button>
</div>
</div>
<div class="container" id="page-content"><div class="loading"><div class="spinner"></div></div></div>
<input type="file" id="file-input" accept="image/png,image/jpeg,image/webp,image/gif" />
<div class="modal-backdrop" id="delete-modal">
<div class="modal">
<h3>Delete account permanently</h3>
<p>This action cannot be undone. This will permanently delete your account, profile, history, bookmarks, and all associated data.</p>
<p style="margin-top:14px;">Type <strong>DELETE</strong> below to confirm:</p>
<input type="text" id="delete-confirm-input" placeholder="DELETE" autocomplete="off" />
<div class="modal-actions">
<button class="btn" id="delete-cancel">Cancel</button>
<button class="btn btn-danger" id="delete-confirm-btn" disabled>Delete account</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://pcalrousicyuyiyoppqt.supabase.co";
const SUPABASE_KEY = "sb_publishable_mFKL1y755kJphEu231y8AA_KgV3W6xe";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;
let currentProfile = null;
function toast(msg, type) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show " + (type || "");
  setTimeout(function(){ el.classList.remove("show"); }, 3200);
}
function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/\x27/g, "&#39;");
}
function fmtDate(ts) {
  if (!ts) return "—";
  return new Date(ts).toLocaleDateString(undefined, { year:"numeric", month:"short", day:"numeric" });
}
function getInitials(profile, user) {
  const name = (profile && (profile.display_name || profile.full_name)) || (user && user.email) || "?";
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.substring(0, 2).toUpperCase();
}
async function loadProfile() {
  const userResp = await supabase.auth.getUser();
  const user = userResp.data && userResp.data.user;
  if (!user) { window.location.href = "/?signin=1"; return; }
  currentUser = user;
  const pr = await supabase.from("profiles").select("*").eq("id", user.id).single();
  if (pr.error && pr.error.code !== "PGRST116") { console.error(pr.error); toast("Failed to load profile", "error"); return; }
  currentProfile = pr.data || { id: user.id, email: user.email };
  const hc = await supabase.from("user_history").select("*", { count: "exact", head: true }).eq("user_id", user.id);
  const bc = await supabase.from("bookmarks").select("*", { count: "exact", head: true }).eq("user_id", user.id);
  renderPage(hc.count || 0, bc.count || 0);
}
function renderPage(historyCount, bookmarksCount) {
  const p = currentProfile;
  const u = currentUser;
  const tier = (p.subscription_tier || "free").toLowerCase();
  const tierBadge = tier === "free"
    ? '<span class="badge badge-free">Free</span>'
    : '<span class="badge badge-pro">' + escapeHtml(tier.toUpperCase()) + '</span>';
  const avatarHtml = p.avatar_url
    ? '<img src="' + escapeHtml(p.avatar_url) + '?t=' + Date.now() + '" alt="avatar" />'
    : escapeHtml(getInitials(p, u));
  const removeBtn = p.avatar_url ? '<button class="btn btn-ghost" id="remove-avatar-btn">Remove</button>' : "";
  let html = "";
  html += '<h1>Account</h1>';
  html += '<p class="subtitle">Manage your MapNova profile, preferences, and account settings.</p>';
  html += '<div class="card"><h2>Profile picture</h2><div class="avatar-section">';
  html += '<div class="avatar" id="avatar-display">' + avatarHtml + '</div>';
  html += '<div class="avatar-controls">';
  html += '<button class="btn btn-primary" id="upload-avatar-btn">Upload new picture</button>';
  html += removeBtn;
  html += '<span style="font-size:12px;color:var(--text-dim);">PNG, JPG, WebP, or GIF · max 5MB</span>';
  html += '</div></div></div>';
  html += '<div class="card"><h2>Profile details</h2><p class="card-desc">This information will appear on your account.</p>';
  html += '<div class="row">';
  html += '<div class="field"><label>Display name</label><input type="text" id="display_name" value="' + escapeHtml(p.display_name) + '" placeholder="How you would like to appear" /></div>';
  html += '<div class="field"><label>Full name</label><input type="text" id="full_name" value="' + escapeHtml(p.full_name) + '" placeholder="Your full name" /></div>';
  html += '</div>';
  html += '<div class="field"><label>Bio</label><textarea id="bio" placeholder="A short bio">' + escapeHtml(p.bio) + '</textarea></div>';
  html += '<div class="row">';
  html += '<div class="field"><label>Organization</label><input type="text" id="organization" value="' + escapeHtml(p.organization) + '" placeholder="Company or org" /></div>';
  html += '<div class="field"><label>Location</label><input type="text" id="location" value="' + escapeHtml(p.location) + '" placeholder="City, State" /></div>';
  html += '</div>';
  html += '<div class="row">';
  html += '<div class="field"><label>Phone</label><input type="tel" id="phone" value="' + escapeHtml(p.phone) + '" placeholder="(optional)" /></div>';
  html += '<div class="field"><label>Website</label><input type="url" id="website" value="' + escapeHtml(p.website) + '" placeholder="https://" /></div>';
  html += '</div>';
  html += '<div class="save-row"><button class="btn btn-primary" id="save-profile-btn">Save changes</button></div>';
  html += '</div>';
  html += '<div class="card"><h2>Account info</h2><div class="stat-row">';
  html += '<div class="stat"><div class="stat-label">Email</div><div class="stat-value">' + escapeHtml(u.email) + '</div></div>';
  html += '<div class="stat"><div class="stat-label">Plan</div><div class="stat-value">' + tierBadge + '</div></div>';
  html += '<div class="stat"><div class="stat-label">Member since</div><div class="stat-value">' + fmtDate(u.created_at) + '</div></div>';
  html += '<div class="stat"><div class="stat-label">Activity events</div><div class="stat-value">' + historyCount + '</div></div>';
  html += '<div class="stat"><div class="stat-label">Bookmarks</div><div class="stat-value">' + bookmarksCount + '</div></div>';
  html += '</div></div>';
  html += '<div class="card"><h2>Email &amp; password</h2><p class="card-desc">Update your email or send yourself a password reset link.</p>';
  html += '<div class="row"><div class="field"><label>Change email</label><input type="email" id="new_email" placeholder="' + escapeHtml(u.email) + '" /></div></div>';
  html += '<div class="save-row"><button class="btn" id="send-reset-btn">Send password reset email</button><button class="btn btn-primary" id="change-email-btn">Update email</button></div>';
  html += '</div>';
  html += '<div class="card danger-zone"><h2>Danger zone</h2><p class="card-desc">Permanently delete your account and all associated data.</p>';
  html += '<button class="btn btn-danger" id="delete-account-btn">Delete my account</button></div>';
  document.getElementById("page-content").innerHTML = html;
  bindEvents();
}
function bindEvents() {
  document.getElementById("save-profile-btn").onclick = saveProfile;
  document.getElementById("upload-avatar-btn").onclick = function(){ document.getElementById("file-input").click(); };
  const removeBtn = document.getElementById("remove-avatar-btn");
  if (removeBtn) removeBtn.onclick = removeAvatar;
  document.getElementById("send-reset-btn").onclick = sendPasswordReset;
  document.getElementById("change-email-btn").onclick = changeEmail;
  document.getElementById("delete-account-btn").onclick = openDeleteModal;
}
async function saveProfile() {
  const btn = document.getElementById("save-profile-btn");
  btn.disabled = true; btn.textContent = "Saving...";
  const updates = {
    id: currentUser.id,
    email: currentUser.email,
    display_name: document.getElementById("display_name").value.trim() || null,
    full_name: document.getElementById("full_name").value.trim() || null,
    bio: document.getElementById("bio").value.trim() || null,
    organization: document.getElementById("organization").value.trim() || null,
    location: document.getElementById("location").value.trim() || null,
    phone: document.getElementById("phone").value.trim() || null,
    website: document.getElementById("website").value.trim() || null,
    updated_at: new Date().toISOString()
  };
  const r = await supabase.from("profiles").upsert(updates);
  btn.disabled = false; btn.textContent = "Save changes";
  if (r.error) { toast("Save failed: " + r.error.message, "error"); return; }
  Object.assign(currentProfile, updates);
  toast("Profile saved", "success");
}
document.addEventListener("DOMContentLoaded", function(){
  document.getElementById("file-input").addEventListener("change", handleFileChange);
  document.getElementById("delete-cancel").onclick = function(){ document.getElementById("delete-modal").classList.remove("show"); };
  document.getElementById("delete-confirm-input").addEventListener("input", function(e){
    document.getElementById("delete-confirm-btn").disabled = e.target.value !== "DELETE";
  });
  document.getElementById("delete-confirm-btn").onclick = confirmDelete;
  document.getElementById("signout-btn").onclick = async function(){
    await supabase.auth.signOut();
    window.location.href = "/";
  };
  loadProfile();
});
async function handleFileChange(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast("File too large (max 5MB)", "error"); return; }
  toast("Uploading...");
  const ext = file.name.split(".").pop().toLowerCase();
  const path = currentUser.id + "/avatar-" + Date.now() + "." + ext;
  const up = await supabase.storage.from("avatars").upload(path, file, { upsert: true, contentType: file.type });
  if (up.error) { toast("Upload failed: " + up.error.message, "error"); return; }
  const pub = supabase.storage.from("avatars").getPublicUrl(path);
  const publicUrl = pub.data.publicUrl;
  if (currentProfile.avatar_url) {
    try {
      const oldPath = currentProfile.avatar_url.split("/avatars/")[1];
      if (oldPath && oldPath !== path) await supabase.storage.from("avatars").remove([oldPath]);
    } catch(_) {}
  }
  const upd = await supabase.from("profiles").upsert({ id: currentUser.id, email: currentUser.email, avatar_url: publicUrl, updated_at: new Date().toISOString() });
  if (upd.error) { toast("Save failed: " + upd.error.message, "error"); return; }
  currentProfile.avatar_url = publicUrl;
  toast("Profile picture updated", "success");
  loadProfile();
}
async function removeAvatar() {
  if (!confirm("Remove your profile picture?")) return;
  if (currentProfile.avatar_url) {
    try {
      const oldPath = currentProfile.avatar_url.split("/avatars/")[1];
      if (oldPath) await supabase.storage.from("avatars").remove([oldPath]);
    } catch(_) {}
  }
  const r = await supabase.from("profiles").upsert({ id: currentUser.id, email: currentUser.email, avatar_url: null, updated_at: new Date().toISOString() });
  if (r.error) { toast("Remove failed: " + r.error.message, "error"); return; }
  currentProfile.avatar_url = null;
  toast("Profile picture removed", "success");
  loadProfile();
}
async function sendPasswordReset() {
  const r = await supabase.auth.resetPasswordForEmail(currentUser.email, { redirectTo: window.location.origin + "/" });
  if (r.error) { toast(r.error.message, "error"); return; }
  toast("Password reset email sent to " + currentUser.email, "success");
}
async function changeEmail() {
  const newEmail = document.getElementById("new_email").value.trim();
  if (!newEmail) { toast("Enter a new email", "error"); return; }
  if (newEmail === currentUser.email) { toast("That is already your email", "error"); return; }
  const r = await supabase.auth.updateUser({ email: newEmail });
  if (r.error) { toast(r.error.message, "error"); return; }
  toast("Confirmation sent to " + newEmail + ". Check both inboxes.", "success");
}
function openDeleteModal() {
  document.getElementById("delete-modal").classList.add("show");
  document.getElementById("delete-confirm-input").value = "";
  document.getElementById("delete-confirm-btn").disabled = true;
}
async function confirmDelete() {
  const btn = document.getElementById("delete-confirm-btn");
  btn.disabled = true; btn.textContent = "Deleting...";
  try {
    const list = await supabase.storage.from("avatars").list(currentUser.id);
    if (list.data && list.data.length) {
      const paths = list.data.map(function(f){ return currentUser.id + "/" + f.name; });
      await supabase.storage.from("avatars").remove(paths);
    }
  } catch(_) {}
  await supabase.from("user_history").delete().eq("user_id", currentUser.id);
  await supabase.from("bookmarks").delete().eq("user_id", currentUser.id);
  await supabase.from("layer_preferences").delete().eq("user_id", currentUser.id);
  const r = await supabase.from("profiles").delete().eq("id", currentUser.id);
  if (r.error) { toast("Delete failed: " + r.error.message, "error"); btn.disabled = false; btn.textContent = "Delete account"; return; }
  try { await supabase.rpc("delete_user"); } catch(_) {}
  await supabase.auth.signOut();
  alert("Your account data has been deleted. You will be signed out.");
  window.location.href = "/";
}
</script>
</body>
</html>
