name = "mapnova-api"
main = "src/index.ts"
compatibility_date = "2024-10-22"
# nodejs_compat is required by @sentry/cloudflare (uses node:async_hooks for AsyncLocalStorage).
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Custom route api.mapnova.org/* is configured via the Cloudflare dashboard
# (Workers & Pages → mapnova-api → Settings → Triggers → Add Custom Domain)
# rather than here, because zone-level routes require zone-edit permission
# on the deploy API token, which the standard "Edit Workers" template lacks.

# Required Worker secrets (set via `wrangler secret put <name>`):
#   SENTRY_DSN_API  — Sentry DSN for the API worker; Sentry is disabled when unset
#   WORKER_VERSION  — set in CI from git SHA via wrangler deploy --var WORKER_VERSION:$(git rev-parse --short HEAD)

# KV namespace for discovery caching.
# Setup (one-time, done in the Cloudflare dashboard after first deploy):
#   Workers & Pages → KV → Create namespace → name it "mapnova-discovery-cache"
#   Then paste the namespace ID below and redeploy via the Deploy API workflow.
[[kv_namespaces]]
binding = "DISCOVERY_CACHE"
id = "fcafc7d60f044b819c46a76f361c4a7a"

# D1 database for Phase 1+ persistence (users, projects, future tables).
# Provisioned 2026-05-06 via Cloudflare dashboard; binding consumed by PR #50.
[[d1_databases]]
binding = "DB"
database_name = "mapnova"
database_id = "233b1c9d-16c6-40cc-93a6-8c482a666839"
